<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #f4f3f0; font-family: 'Montserrat', system-ui, sans-serif; color: #1A1A1A; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(241,93,34,0.6); }
    50% { box-shadow: 0 0 0 6px rgba(241,93,34,0); }
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes flash {
    from { background: rgba(241,93,34,0.18); }
    to { background: transparent; }
  }
  .flash-in { animation: flash 1.2s ease-out; }
  summary::-webkit-details-marker { display: none; }
  summary { list-style: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d4d0c8; border-radius: 6px; border: 2px solid #f4f3f0; }
  ::-webkit-scrollbar-thumb:hover { background: #b7b1a8; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>

<div id="root"></div>

<script>window.LIVE = true;</script>
<script src="api.js"></script>
<script src="adapters.js"></script>
<script src="shared.jsx" type="text/babel"></script>
<script src="prototype-extras.jsx" type="text/babel"></script>
<script src="prototype.jsx" type="text/babel"></script>

</body>
