name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  checks:
    name: Syntax + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Syntax-check every .py file
        shell: bash
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            if ! python -m py_compile "$f"; then
              echo "::error file=$f::syntax error"
              fail=1
            fi
          done < <(find . -name '*.py' \
                        -not -path './.venv/*' \
                        -not -path './venv/*' \
                        -not -path './.git/*' \
                        -print0)
          exit $fail

      - name: Install ruff
        run: pip install ruff

      - name: Lint for undefined names and unreachable code
        # Strict rules only -- E9 (syntax), F63 (comparisons), F7 (logic errors).
        # F82 (undefined name) is excluded because the TXN notebook cells share
        # a global namespace injected at runtime by txn_wrapper.py.
        run: ruff check . --select=E9,F63,F7 --exclude=.venv,venv

  tests:
    name: Pytest suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime + test deps
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run the analytics test suite
        # Locks the data-accuracy contracts (canonical denominators,
        # DCTR-2 open-vs-eligible, brand authority, run manifest, scorecard).
        # conftest.py wires the ars_analysis package alias from 00-Scripts.
        working-directory: 01_Analysis/00-Scripts
        run: python -m pytest tests/ -q
